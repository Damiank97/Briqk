<style>
  :root {
    --black: #080808;
    --white: #F5F2ED;
    --lime: #C8FF00;
    --lime-dark: #9FCC00;
    --grey: #1A1A1A;
    --grey-mid: #2E2E2E;
    --grey-text: #999;
    --font-display: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; overflow-x: hidden; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); font-size: 16px; line-height: 1.6; overflow-x: hidden; max-width: 100vw; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 20px 80px; backdrop-filter: blur(16px); background: rgba(8,8,8,0.7); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 22px; letter-spacing: -0.5px; color: var(--white); text-decoration: none; }
  .nav-logo span { color: var(--lime); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { color: var(--grey-text); text-decoration: none; font-size: 14px; font-weight: 400; letter-spacing: 0.02em; transition: color 0.2s; }
  .nav-links a:hover { color: var(--white); }
  .nav-cta { background: var(--lime); color: var(--black) !important; padding: 10px 22px; border-radius: 100px; font-weight: 500 !important; transition: background 0.2s, transform 0.2s !important; }
  .nav-cta:hover { background: var(--lime-dark) !important; transform: translateY(-1px); }
  .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
  .hamburger span { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }
  .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
  .mobile-nav { display: none; position: fixed; top: 65px; left: 0; right: 0; background: rgba(8,8,8,0.97); padding: 24px; z-index: 99; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .mobile-nav.open { display: flex; flex-direction: column; gap: 20px; }
  .mobile-nav a { color: var(--white); text-decoration: none; font-size: 18px; font-weight: 400; }

  /* HERO */
  .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 160px 80px 80px; position: relative; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 60% 50% at 70% 40%, rgba(200,255,0,0.08) 0%, transparent 70%), radial-gradient(ellipse 40% 40% at 20% 80%, rgba(200,255,0,0.04) 0%, transparent 60%); pointer-events: none; }
  .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size: 80px 80px; pointer-events: none; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent); }
  .hero-tag { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,255,0,0.1); border: 1px solid rgba(200,255,0,0.25); color: var(--lime); padding: 6px 16px; border-radius: 100px; font-size: 13px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 36px; width: fit-content; animation: fadeUp 0.8s ease both; }
  .hero-tag::before { content: ''; width: 6px; height: 6px; background: var(--lime); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
  .hero h1 { font-family: var(--font-display); font-size: clamp(36px, 5vw, 72px); font-weight: 800; line-height: 0.95; letter-spacing: -2px; max-width: 800px; animation: fadeUp 0.8s 0.1s ease both; }
  .hero h1 em { font-style: normal; color: var(--lime); }
  .hero-sub { font-size: 18px; font-weight: 300; color: var(--grey-text); max-width: 540px; margin-top: 28px; line-height: 1.7; animation: fadeUp 0.8s 0.2s ease both; }
  .hero-sub strong { color: var(--white); font-weight: 400; }
  .hero-actions { display: flex; gap: 16px; margin-top: 44px; align-items: center; animation: fadeUp 0.8s 0.3s ease both; flex-wrap: wrap; }
  .btn-primary { background: var(--lime); color: var(--black); padding: 16px 32px; border-radius: 100px; font-family: var(--font-body); font-size: 15px; font-weight: 500; border: none; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; transition: background 0.2s, transform 0.2s, box-shadow 0.2s; }
  .btn-primary:hover { background: var(--lime-dark); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(200,255,0,0.3); }
  .btn-ghost { color: var(--white); padding: 16px 24px; border-radius: 100px; font-family: var(--font-body); font-size: 15px; font-weight: 400; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; opacity: 0.7; transition: opacity 0.2s; }
  .btn-ghost:hover { opacity: 1; }
  .hero-stats { display: flex; gap: 48px; margin-top: 80px; padding-top: 48px; border-top: 1px solid rgba(255,255,255,0.08); animation: fadeUp 0.8s 0.4s ease both; flex-wrap: wrap; }
  .stat-num { font-family: var(--font-display); font-size: 36px; font-weight: 800; color: var(--white); letter-spacing: -1px; }
  .stat-num span { color: var(--lime); }
  .stat-label { font-size: 13px; color: var(--grey-text); margin-top: 4px; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes boltBounce { 0%, 100% { transform: translateY(0); opacity: 0.6; } 50% { transform: translateY(10px); opacity: 1; } }

  /* SECTIONS */
  section { padding: 120px 80px; }
  .section-tag { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--lime); margin-bottom: 16px; }
  .section-title { font-family: var(--font-display); font-size: clamp(36px, 4vw, 56px); font-weight: 800; letter-spacing: -2px; line-height: 1; max-width: 600px; }
  .section-sub { font-size: 16px; color: var(--grey-text); margin-top: 16px; max-width: 480px; line-height: 1.7; }

  /* HOE HET WERKT */
  .how { background: var(--grey); }
  .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; margin-top: 60px; }
  .step { background: var(--black); padding: 40px; position: relative; transition: background 0.3s; }
  .step:hover { background: #111; }
  .step-num { font-family: var(--font-display); font-size: 72px; font-weight: 800; color: rgba(255,255,255,0.12); line-height: 1; position: absolute; top: 24px; right: 32px; }
  .step-icon { width: 48px; height: 48px; background: rgba(200,255,0,0.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 20px; }
  .step h3 { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 12px; }
  .step p { font-size: 14px; color: var(--grey-text); line-height: 1.7; }

  /* DRIE PIJLERS */
  .pillars-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 60px; }
  .pillar { background: var(--grey); padding: 48px; position: relative; overflow: hidden; transition: background 0.3s; }
  .pillar:hover { background: #1f1f1f; }
  .pillar::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--lime); transform: scaleX(0); transform-origin: left; transition: transform 0.3s; }
  .pillar:hover::after { transform: scaleX(1); }
  .pillar-icon { font-size: 36px; margin-bottom: 20px; }
  .pillar-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lime); margin-bottom: 12px; }
  .pillar h3 { font-family: var(--font-display); font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 14px; }
  .pillar p { font-size: 14px; color: var(--grey-text); line-height: 1.8; margin-bottom: 24px; }
  .pillar-items { display: flex; flex-direction: column; gap: 8px; }
  .pillar-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--grey-text); }
  .pillar-item::before { content: ''; width: 6px; height: 6px; background: var(--lime); border-radius: 50%; flex-shrink: 0; }

  /* DUAL BOT DEMO */
  .demo-section { background: var(--black); position: relative; overflow: hidden; }
  .demo-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 50% 60% at 50% 50%, rgba(200,255,0,0.03), transparent); pointer-events: none; }
  .demo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 60px; align-items: stretch; }
  .demo-grid .chat-widget { display: flex; flex-direction: column; height: 100%; }
  .demo-grid .chat-messages { flex: 1; height: auto; min-height: 240px; }
  .demo-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--lime); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .demo-label span { background: rgba(200,255,0,0.15); border: 1px solid rgba(200,255,0,0.3); padding: 2px 10px; border-radius: 100px; }

  /* CHAT WIDGET */
  .chat-widget { background: var(--grey); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.5); }
  .chat-header { background: var(--grey-mid); padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .chat-avatar { width: 36px; height: 36px; background: var(--lime); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .chat-header-name { font-weight: 500; font-size: 14px; }
  .chat-header-status { font-size: 12px; color: var(--lime); display: flex; align-items: center; gap: 5px; }
  .chat-header-status::before { content: ''; width: 6px; height: 6px; background: var(--lime); border-radius: 50%; }
  .chat-messages { height: 260px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .msg { display: flex; gap: 10px; max-width: 85%; animation: msgIn 0.3s ease; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; }
  .msg.bot .msg-bubble { background: var(--grey-mid); color: var(--white); border-radius: 4px 16px 16px 16px; }
  .msg.user .msg-bubble { background: var(--lime); color: var(--black); border-radius: 16px 4px 16px 16px; }
  .msg-dot { width: 28px; height: 28px; background: var(--lime); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; align-self: flex-end; }
  .msg.user .msg-dot { background: var(--grey-mid); border: 1px solid rgba(255,255,255,0.1); }
  .typing-indicator { display: flex; gap: 4px; padding: 12px 14px; }
  .typing-dot { width: 6px; height: 6px; background: var(--grey-text); border-radius: 50%; animation: typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
  .chat-input-area { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.06); display: flex; gap: 10px; align-items: center; }
  .chat-input { flex: 1; background: var(--grey-mid); border: 1px solid rgba(255,255,255,0.08); border-radius: 100px; padding: 10px 18px; color: var(--white); font-family: var(--font-body); font-size: 14px; outline: none; transition: border-color 0.2s; }
  .chat-input::placeholder { color: var(--grey-text); }
  .chat-input:focus { border-color: rgba(200,255,0,0.4); }
  .chat-send { width: 40px; height: 40px; background: var(--lime); border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: background 0.2s, transform 0.2s; flex-shrink: 0; }
  .chat-send:hover { background: var(--lime-dark); transform: scale(1.05); }
  .chat-send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .quick-questions { padding: 0 20px 12px; display: flex; gap: 8px; flex-wrap: wrap; }
  .quick-q { background: rgba(200,255,0,0.08); border: 1px solid rgba(200,255,0,0.2); color: var(--lime); padding: 6px 12px; border-radius: 100px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-family: var(--font-body); }
  .quick-q:hover { background: rgba(200,255,0,0.15); border-color: rgba(200,255,0,0.4); }
  .progress-bar { height: 3px; background: rgba(200,255,0,0.2); margin: 0 20px 12px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--lime); border-radius: 2px; transition: width 0.4s ease; }

  /* CV MAKER SECTION */
  .cv-section { background: var(--grey); }
  .cv-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-top: 60px; }
  .cv-info h2 { font-family: var(--font-display); font-size: clamp(28px, 3vw, 42px); font-weight: 800; letter-spacing: -2px; line-height: 1.05; margin-bottom: 16px; }
  .cv-info p { font-size: 15px; color: var(--grey-text); line-height: 1.8; margin-bottom: 12px; }
  .cv-features { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; }
  .cv-feature { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--grey-text); }
  .cv-feature::before { content: ''; width: 6px; height: 6px; background: var(--lime); border-radius: 50%; flex-shrink: 0; }
  .cv-tool { background: var(--black); border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); overflow: hidden; }
  .cv-tool-header { background: var(--grey-mid); padding: 16px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
  .cv-tool-icon { width: 36px; height: 36px; background: var(--lime); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .cv-tool-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .cv-group label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--grey-text); display: block; margin-bottom: 6px; }
  .cv-group textarea { width: 100%; background: var(--grey); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 12px 16px; color: var(--white); font-family: var(--font-body); font-size: 13px; outline: none; resize: vertical; transition: border-color 0.2s; line-height: 1.6; }
  .cv-group textarea:focus { border-color: rgba(200,255,0,0.4); }
  .cv-result { background: var(--grey); border-radius: 10px; padding: 16px; font-size: 13px; color: var(--grey-text); line-height: 1.7; min-height: 100px; white-space: pre-wrap; display: none; }
  .cv-result.visible { display: block; color: var(--white); }
  .btn-cv { width: 100%; padding: 14px; background: var(--lime); color: var(--black); border: none; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-cv:hover { background: var(--lime-dark); transform: translateY(-1px); }
  .btn-cv:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .saas-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(200,255,0,0.1); border: 1px solid rgba(200,255,0,0.2); color: var(--lime); padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 12px; }

  /* PRICING */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 60px; }
  .pricing-card { background: var(--grey); padding: 40px 32px; position: relative; transition: background 0.3s; }
  .pricing-card.featured { background: var(--lime); color: var(--black); }
  .pricing-card:not(.featured):hover { background: #222; }
  .pricing-badge { display: inline-block; background: var(--black); color: var(--lime); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 12px; border-radius: 100px; margin-bottom: 20px; }
  .pricing-name { font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 6px; }
  .pricing-price { font-family: var(--font-display); font-size: 48px; font-weight: 800; letter-spacing: -3px; line-height: 1; margin: 16px 0; }
  .pricing-price sup { font-size: 22px; font-weight: 600; letter-spacing: 0; }
  .pricing-period { font-size: 13px; opacity: 0.6; font-weight: 300; }
  .pricing-desc { font-size: 13px; opacity: 0.7; line-height: 1.6; margin: 16px 0; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
  .pricing-card.featured .pricing-desc { border-top-color: rgba(0,0,0,0.1); }
  .pricing-features { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 28px; }
  .pricing-features li { font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
  .pricing-features li::before { content: '✓'; font-weight: 700; color: var(--lime); font-size: 12px; flex-shrink: 0; margin-top: 2px; }
  .pricing-card.featured .pricing-features li::before { color: var(--black); }
  .btn-pricing { width: 100%; padding: 13px; border-radius: 100px; font-family: var(--font-body); font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.2s; }
  .btn-pricing-dark { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--white); }
  .btn-pricing-dark:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.3); }
  .btn-pricing-black { background: var(--black); color: var(--lime); }
  .btn-pricing-black:hover { background: #111; transform: translateY(-1px); }

  /* LAUNCH */
  .launch-section { background: var(--grey); display: flex; justify-content: center; }
  .launch-inner { max-width: 720px; width: 100%; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 28px; }
  .launch-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(200,255,0,0.1); border: 1px solid rgba(200,255,0,0.3); color: var(--lime); padding: 6px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; }
  .launch-spots { display: flex; gap: 16px; justify-content: center; }
  .launch-spot { width: 80px; height: 80px; border-radius: 16px; background: var(--black); border: 2px solid rgba(200,255,0,0.3); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .spot-num { font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--lime); line-height: 1; }
  .spot-status { font-size: 10px; color: var(--lime); letter-spacing: 0.05em; text-transform: uppercase; }
  .launch-deal { background: var(--black); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 32px 40px; display: flex; align-items: center; gap: 32px; flex-wrap: wrap; justify-content: center; width: 100%; }
  .launch-deal-label { font-size: 12px; color: var(--grey-text); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .launch-deal-price { font-family: var(--font-display); font-size: 38px; font-weight: 800; letter-spacing: -2px; }
  .launch-deal-price.strike { text-decoration: line-through; color: var(--grey-text); font-size: 26px; }
  .launch-deal-item.highlight .launch-deal-price { color: var(--lime); }
  .launch-deal-arrow { font-size: 24px; color: var(--grey-text); }
  .launch-deal-includes { display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: var(--grey-text); border-left: 1px solid rgba(255,255,255,0.08); padding-left: 32px; text-align: left; }
  .launch-deal-includes span { color: var(--white); }

async function callAPI(systemPrompt, userMsg) {
  const res = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ systemPrompt: systemPrompt, message: userMsg })
  });
  if (!res.ok) throw new Error('API fout: ' + res.status);
  const data = await res.json();
  return data.reply || data.choices?.[0]?.message?.content || 'Geen antwoord ontvangen.';

function addMsg(containerId, text, type, avatarEmoji) {

function renderCV(text) {
  return text.split("\n").map(function(line) {
    var clean = line.replace(/\*\*/g, "");
    var headers = ["PROFESSIONELE SAMENVATTING","TOP 3 WERKPUNTEN","Professionele Samenvatting","Top 3 Werkpunten"];
    for (var i = 0; i < headers.length; i++) {
      if (clean.indexOf(headers[i]) === 0) {
        return '<strong style="color:var(--lime);display:block;margin-top:14px;margin-bottom:4px">' + clean + '</strong>';
      }
    }
    if (clean.charAt(0) === "-" || clean.charAt(0) === "\u2013") {
      return "\u2022 " + clean.slice(2);
    }
    return clean;
  }).join("<br>");
}
